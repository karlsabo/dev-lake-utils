name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.gradle-version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read release tag
        id: tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME:?GITHUB_REF_NAME is required}"
          if [[ ! "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag '$tag' must be raw stable SemVer (MAJOR.MINOR.PATCH)."
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Read Gradle version
        id: gradle-version
        shell: bash
        run: |
          version_file="$RUNNER_TEMP/gradle-version.txt"
          ./gradlew -q printVersion > "$version_file"
          version="$(grep -E '^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.+-]+)?$' "$version_file" | tail -n 1 | tr -d '\r')"
          if [[ -z "$version" ]]; then
            echo "::error::Could not read Gradle version from printVersion output."
            exit 1
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Gradle version '$version' must be raw stable SemVer for releases."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches Gradle version
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          GRADLE_VERSION: ${{ steps.gradle-version.outputs.version }}
        run: |
          if [[ "$RELEASE_TAG" != "$GRADLE_VERSION" ]]; then
            echo "::error::Release tag '$RELEASE_TAG' does not match Gradle version '$GRADLE_VERSION'."
            exit 1
          fi

  create-release:
    name: create-release
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi

  publish-linux:
    name: publish-linux
    needs: [preflight, create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes fakeroot rpm

      - name: Package Linux installers
        run: ./gradlew clean :eng-hub:packageDeb :eng-hub:packageRpm

      - name: Prepare release assets
        id: asset
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          mapfile -t deb_packages < <(find eng-hub/build/compose/binaries/main/deb -type f -name '*.deb')
          mapfile -t rpm_packages < <(find eng-hub/build/compose/binaries/main/rpm -type f -name '*.rpm')

          if (( ${#deb_packages[@]} != 1 )); then
            echo "::error::Expected exactly one Debian package, found ${#deb_packages[@]}."
            exit 1
          fi
          if (( ${#rpm_packages[@]} != 1 )); then
            echo "::error::Expected exactly one RPM package, found ${#rpm_packages[@]}."
            exit 1
          fi

          mkdir -p release-assets
          deb_asset="release-assets/eng-hub-${RELEASE_VERSION}-linux-amd64.deb"
          rpm_asset="release-assets/eng-hub-${RELEASE_VERSION}-linux-x86_64.rpm"
          mv "${deb_packages[0]}" "$deb_asset"
          mv "${rpm_packages[0]}" "$rpm_asset"
          echo "deb_path=$deb_asset" >> "$GITHUB_OUTPUT"
          echo "rpm_path=$rpm_asset" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
          DEB_ASSET_PATH: ${{ steps.asset.outputs.deb_path }}
          RPM_ASSET_PATH: ${{ steps.asset.outputs.rpm_path }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "$DEB_ASSET_PATH#Eng Hub for Debian/Ubuntu (amd64)" \
            "$RPM_ASSET_PATH#Eng Hub for Fedora/RHEL (x86_64)" \
            --clobber

  publish-macos:
    name: publish-macos
    needs: [preflight, create-release]
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Package macOS installer
        run: ./gradlew clean :eng-hub:packageDmg

      - name: Prepare release asset
        id: asset
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          dmg_packages=()
          while IFS= read -r -d '' package; do
            dmg_packages+=("$package")
          done < <(find eng-hub/build/compose/binaries/main/dmg -type f -name '*.dmg' -print0)

          if (( ${#dmg_packages[@]} != 1 )); then
            echo "::error::Expected exactly one DMG package, found ${#dmg_packages[@]}."
            exit 1
          fi

          mkdir -p release-assets
          dmg_asset="release-assets/eng-hub-${RELEASE_VERSION}-macos.dmg"
          mv "${dmg_packages[0]}" "$dmg_asset"
          echo "dmg_path=$dmg_asset" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
          DMG_ASSET_PATH: ${{ steps.asset.outputs.dmg_path }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "$DMG_ASSET_PATH#Eng Hub for macOS" \
            --clobber

  publish-windows:
    name: publish-windows
    needs: [preflight, create-release]
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Package Windows installer
        run: ./gradlew.bat clean :eng-hub:packageMsi

      - name: Prepare release asset
        id: asset
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          $msiPackages = @(Get-ChildItem -Path "eng-hub/build/compose/binaries/main/msi" -Recurse -File -Filter "*.msi")

          if ($msiPackages.Count -ne 1) {
            Write-Error "Expected exactly one MSI package, found $($msiPackages.Count)."
            exit 1
          }

          New-Item -ItemType Directory -Path "release-assets" -Force | Out-Null
          $msiAsset = "release-assets/eng-hub-$env:RELEASE_VERSION-windows-x64.msi"
          Move-Item -Path $msiPackages[0].FullName -Destination $msiAsset
          "msi_path=$msiAsset" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish GitHub Release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
          MSI_ASSET_PATH: ${{ steps.asset.outputs.msi_path }}
        run: |
          gh release upload $env:RELEASE_TAG `
            "$env:MSI_ASSET_PATH#Eng Hub for Windows (x64)" `
            --clobber
