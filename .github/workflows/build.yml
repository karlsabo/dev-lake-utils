name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-linux:
    name: build-linux
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew clean build --no-build-cache

      - name: Summarize failed tests
        if: always()
        uses: test-summary/action@v2
        with:
          paths: "**/build/test-results/**/TEST-*.xml"
          show: fail

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-reports-linux
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          if-no-files-found: warn

  build-macos:
    name: build-macos
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew clean build --no-build-cache

      - name: Summarize failed tests
        if: always()
        uses: test-summary/action@v2
        with:
          paths: "**/build/test-results/**/TEST-*.xml"
          show: fail

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-reports-macos
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          if-no-files-found: warn

  build-windows:
    name: build-windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        shell: bash
        run: ./gradlew clean build --no-build-cache

      - name: Summarize failed tests
        if: always()
        uses: test-summary/action@v2
        with:
          paths: "**/build/test-results/**/TEST-*.xml"
          show: fail

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-reports-windows
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          if-no-files-found: warn
